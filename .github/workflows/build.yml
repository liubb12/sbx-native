name: Build and Push Slim Docker Image to GHCR

on:
  push:
    branches: [ main ]
    # 只要 main 分支有任何代码变动，就立刻触发构建
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/sbx-native
        tags: |
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        # 🔑 核心修正：如果你的 Dockerfile 在仓库根目录，就把下面两行改成 ./ 
        # 如果你的 Dockerfile 在那个叫 pyhton 的文件夹里，就保持 ./pyhton
        context: ./pyhton
        file: ./pyhton/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
